adapters:
  raw:
    enabled: true
    base_url_env: TOOLERY_BASE_URL
    api_key_env: OPENAI_API_KEY
    request_timeout: 60
    max_concurrent: 4
  hermes:
    enabled: false
    gateway_url: http://localhost:8642
    api_url: http://localhost:8644
    token_env: HERMES_TOKEN
    workspace_id: default

storage:
  results_dir: ./results
  sqlite_path: ./results/runs.db
  trace_compression: gzip

ranking:
  history_window_runs: 5
  half_life_days: 14
  bootstrap_iterations: 1000
  min_runs_for_ranking: 2

scenarios:
  dir: ./scenarios
  validate_on_load: true
