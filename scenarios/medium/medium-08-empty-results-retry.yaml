id: medium-08-empty-results-retry
title: "Retry search with broader query after empty result"
tier: easy  # re-tiering kwantylowy 2026-06-11 (kwoty 40/45/34/24, empiryczna trudnosc): oryg medium, pass-rate 100.0% (3 modele)
category: error_recovery
domain: generic
description: "First web_search returns empty. Model must retry with a different/broader query, not give up."
tags: [error_recovery, retry]
ranking_dimensions: [overall, agentic]
prompt: |
  Find me the latest information about the Q3 2026 internal sales report.
  If your first search doesn't return useful results, try a different query.
tools: [web_search]
budget:
  max_tool_calls: 3
  max_turns: 4
  timeout_seconds: 45
tool_responses:
  web_search:
    - call_index: 0
      match: any
      returns: { results: [] }
    - match: any
      returns:
        results:
          - { title: "Sales Q3 2026 — Internal Update", url: "intra://docs/sales-q3-2026", snippet: "Total: $4.2M, up 12% YoY." }
scoring:
  required:
    - check: tool_called
      tool: web_search
    - check: call_count_at_least
      n: 2
    # Accept "4.2M", "$4.2M", "4.2 million", "$4.2 million" etc.
    - check: response_matches_regex
      any_of:
        - "\\$?\\s?4[.,]2\\s?(?:M\\b|million|mln|mio)"
  forbidden: []
  partial:
    - check: call_count_at_most
      n: 3
    - check: tool_called
      tool: web_search
    - check: tool_args_match_regex
      tool: web_search
      arg: query
      pattern: "(?i)(sales|Q3|report|2026)"
    - check: response_satisfies
      any_of:
        - ["sales", "Q3", "report", "4.2M", "12%"]
  weights:
    pass: 1.0
    partial: 0.5
    fail: 0.0
