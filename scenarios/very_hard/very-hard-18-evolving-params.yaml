id: very-hard-18-evolving-params
title: "Akumulujące się constrainty na argumenty toolu"
tier: medium  # re-tiering kwantylowy 2026-06-11 (kwoty 40/45/34/24, empiryczna trudnosc): oryg very_hard, pass-rate 100.0% (3 modele)
category: parameter_precision
domain: generic
description: |
  Single-turn accumulating constraints on tool arguments. The model
  receives 3 sub-instructions in one prompt: location (Tokio), then
  date (2026-07-04), then units (F). Expected behavior: ONE call to
  get_weather_global that carries forward all three constraints
  together — not one call per constraint.
tags: [multi_turn, parameter_carryover]
ranking_dimensions: [overall, parameter_precision, context_state_tracking]
prompt: |
  Turn 1: "Pogoda dla Tokio."
  Turn 2: "A na 2026-07-04."
  Turn 3: "I podaj w Fahrenheitach."
tools: [get_weather_global]
budget:
  max_tool_calls: 3
  max_turns: 4
  timeout_seconds: 50
tool_responses:
  get_weather_global:
    - match: { location: "Tokyo", date: "2026-07-04", units: "F" }
      returns: { temp_f: 86, condition: "humid" }
    - match: { location: "Tokio", date: "2026-07-04", units: "F" }
      returns: { temp_f: 86, condition: "humid" }
    - match: { location: "Tokyo", date: "2026-07-04" }
      returns: { temp_c: 30, condition: "humid" }
    - match: { location: "Tokio", date: "2026-07-04" }
      returns: { temp_c: 30, condition: "humid" }
    - match: { location: "Tokyo" }
      returns: { temp_c: 26, condition: "sunny" }
    - match: { location: "Tokio" }
      returns: { temp_c: 26, condition: "sunny" }
    - match: any
      returns: { error: "missing_required_args" }
scoring:
  required:
    # Single call must carry forward date AND units together (the key
    # accumulation evidence). Location spelling Tokyo/Tokio handled by
    # mock fallbacks; date and units checked via regex so that the model
    # can supply `2026-07-04`, `2026-07-04T00:00`, `"F"` or `"fahrenheit"`
    # and still satisfy the assertion (mock requires exact "F" itself).
    - check: tool_args_match_regex
      tool: get_weather_global
      arg: date
      pattern: "^2026-07-04(?:T.*)?$"
    - check: tool_args_match_regex
      tool: get_weather_global
      arg: units
      pattern: "(?i)^f(ahrenheit)?$"
    - check: response_number
      equals: 86
  forbidden: []
  partial:
    - check: tool_called
      tool: get_weather_global
  weights:
    pass: 1.0
    partial: 0.5
    fail: 0.0
