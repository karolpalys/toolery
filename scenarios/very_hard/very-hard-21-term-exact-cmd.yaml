id: very-hard-21-term-exact-cmd
title: "Pick the exact command from 5 similar ones"
tier: very_hard  # re-tiering kwantylowy 2026-06-11 (kwoty 40/45/34/24, empiryczna trudnosc): oryg very_hard, pass-rate 0.0% (3 modele)
category: terminal_handling
domain: dev_ops
description: |
  User wants to "kill the postgres process running on port 5432". Multiple
  approaches (pkill, kill `pgrep`, lsof -ti, fuser -k, killall). Constraint:
  only kill the process listening on port 5432 specifically, not all postgres.
  Correct: `lsof -ti :5432 | xargs kill` (or `fuser -k 5432/tcp`).
tags: [terminal, exact_choice]
ranking_dimensions: [overall, tool_selection, terminal]
prompt: |
  Kill the postgres process listening exactly on port 5432, nothing else.
  Other postgres instances may also be running (other users, other ports) —
  do not touch those.
tools: [bash_exec]
budget:
  max_tool_calls: 1
  max_turns: 2
  timeout_seconds: 40
tool_responses:
  bash_exec:
    # Accept multiple idiomatic variants for "free port 5432" — single-line
    # pipe forms, separate kill, and the `fuser` fallback. Match keys use
    # command_regex (helper already supports it) so trivial syntactic
    # variations (./prefix, extra flags, whitespace) don't trip the mock.
    - match: { command_regex: "lsof\\s+-ti\\s+:?5432.*xargs.*kill" }
      returns: { stdout: "", stderr: "", exit_code: 0, duration_ms: 12 }
    - match: { command_regex: "kill\\s+\\$\\(lsof\\s+-ti\\s+:?5432\\)" }
      returns: { stdout: "", stderr: "", exit_code: 0, duration_ms: 11 }
    - match: { command_regex: "fuser\\s+-k\\s+5432/tcp" }
      returns: { stdout: "5432/tcp: 12345", stderr: "", exit_code: 0, duration_ms: 15 }
    - match: { command: "killall postgres" }
      returns: { error: "too_broad" }
    - match: { command: "pkill postgres" }
      returns: { error: "too_broad" }
    - match: any
      returns: { error: "unsupported_command" }
scoring:
  required:
    - check: response_satisfies
      any_of:
        - ["lsof -ti :5432", "fuser -k 5432"]
      none_of: ["killall postgres", "pkill postgres"]
    # The bash_exec call itself must be one of the precise commands —
    # response-text check above is necessary but not sufficient.
    - check: tool_args_match_regex
      tool: bash_exec
      arg: command
      pattern: "lsof -ti.*5432|fuser -k 5432"
  forbidden:
    - check: tool_args_contain
      tool: bash_exec
      args: { command: "killall postgres" }
    - check: tool_args_contain
      tool: bash_exec
      args: { command: "pkill postgres" }
  partial:
    - check: response_contains
      patterns: ["5432"]
  weights:
    pass: 1.0
    partial: 0.5
    fail: 0.0
