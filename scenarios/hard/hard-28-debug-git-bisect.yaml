id: hard-28-debug-git-bisect
title: "Regression bisect: find the bad commit"
tier: hard
category: debugging
domain: dev_ops
description: |
  Test was passing on commit c001, fails on HEAD (c008). Model must use
  git_log to enumerate commits and git_show to inspect each, then identify
  the bad commit by content (only ONE touches the failing area). Tests
  regression bisect under tight budget.
tags: [debugging, bisect, multi_step]
ranking_dimensions: [overall, debugging, coding, agentic]
prompt: |
  Test tests/test_pricing.py::test_discount started failing recently. It
  passed at commit c001 (last week's tag v1.2.0). Use git_log and git_show
  to find which commit between c001 and HEAD broke it. Report the commit
  SHA and a one-line explanation.
tools: [git_log, git_show, run_tests]
budget:
  max_tool_calls: 6
  max_turns: 6
  timeout_seconds: 120
tool_responses:
  git_log:
    - match: any
      returns: |
        c008 fix typo in README
        c007 refactor: rename apply_discount → compute_discount
        c006 add logging to checkout flow
        c005 fix: clamp discount to [0, 1] range
        c004 docs: update CHANGELOG
        c003 add new payment method
        c002 add unit tests for pricing
        c001 release v1.2.0
  git_show:
    - match: { sha: "c005" }
      returns: |
        commit c005
        --- a/src/pricing.py
        +++ b/src/pricing.py
        @@ -8 +8 @@
        -    return price * (1 - discount)
        +    return price * (1 - min(1.0, max(0.0, discount)))
    - match: { sha: "c007" }
      returns: |
        commit c007
        --- a/src/pricing.py
        +++ b/src/pricing.py
        @@ -3 +3 @@
        -def apply_discount(price, discount):
        +def compute_discount(price, discount):
        --- a/src/checkout.py
        +++ b/src/checkout.py
        @@ -12 +12 @@
        -    total = apply_discount(p, d)
        +    total = compute_discount(p, d)
    - match: { sha: "c006" }
      returns: |
        commit c006
        --- a/src/checkout.py
        +++ b/src/checkout.py
        @@ +14,2 @@
        +    log.info("checkout for user %s", user_id)
    - match: { sha: "c008" }
      returns: |
        commit c008
        --- a/README.md
        +++ b/README.md
        @@ -1 +1 @@
        -# App
        +# App (v1.3)
    - match: { sha: "c003" }
      returns: |
        commit c003
        --- a/src/payments.py
        +++ b/src/payments.py
        @@ +1,3 @@
        +def pay_stripe(amount):
        +    ...
    - match: any
      returns: { error: "unknown sha" }
  run_tests:
    - match: any
      returns: |
        FAILED tests/test_pricing.py::test_discount
          AttributeError: module 'src.pricing' has no attribute 'apply_discount'
scoring:
  required:
    - check: tool_called
      tool: git_log
    - check: tool_called
      tool: git_show
    - check: response_satisfies
      all_of: ["c007"]
      none_of: ["c005", "c006", "c008", "c003"]
  forbidden:
    - check: response_contains
      patterns: ["c005 broke", "c006 broke", "c008 broke"]
  partial:
    - check: response_satisfies
      any_of:
        - ["rename", "apply_discount", "compute_discount"]
    - check: call_count_at_most
      n: 5
    - check: tool_called_in_order
      sequence: [git_log, git_show]
  weights:
    pass: 1.0
    partial: 0.5
    fail: 0.0
