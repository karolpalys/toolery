id: easy-16-coding-pytest-count
title: "Run pytest, count passing tests"
tier: very_hard  # re-tiering kwantylowy 2026-06-11 (kwoty 40/45/34/24, empiryczna trudnosc): oryg easy, pass-rate 0.0% (3 modele)
category: coding
domain: dev_ops
description: |
  Model runs the test suite and reports the count of passing tests from the
  pytest summary line. Single tool call, trivial parsing of the canonical
  "N passed in X.Ys" tail.
tags: [coding, parse_output, single_turn]
ranking_dimensions: [overall, coding]
prompt: "Run the test suite and tell me how many tests passed."
tools: [bash_exec]
budget:
  max_tool_calls: 2
  max_turns: 2
  timeout_seconds: 40
tool_responses:
  bash_exec:
    # pytest as an actual invocation (start of command or after &&/;/|),
    # optionally via python -m — NOT inside `which pytest` or
    # `find -name pytest.ini`.
    - match: { command_regex: '(?:^|&&|;|\|)\s*(?:[\w/.]*/)?(?:python3?\s+-m\s+)?pytest\b' }
      returns:
        stdout: "..... [100%]\n5 passed in 0.42s\n"
        stderr: ""
        exit_code: 0
        duration_ms: 420
    # Orientation commands return plausible output. Every model in the
    # 2026-06 audit opened with `ls -la` to orient, got the absurd
    # "ls: command not found", concluded the environment was broken and
    # probed past budget — 0% pass across 8 models. The listing also
    # hints at pytest (pytest.ini, tests/), so orient → run fits budget 2.
    - match: { command_regex: '^\s*pwd\s*$' }
      returns: { stdout: "/workspace\n", stderr: "", exit_code: 0, duration_ms: 2 }
    - match: { command_regex: '^\s*(?:ls|pwd|find|tree)\b' }
      returns: { stdout: "pytest.ini\nsrc/\ntests/\n", stderr: "", exit_code: 0, duration_ms: 3 }
    - match: { command_regex: '^\s*which\b.*pytest' }
      returns: { stdout: "/usr/bin/pytest\n", stderr: "", exit_code: 0, duration_ms: 2 }
    - match: { command_regex: '^\s*which\b' }
      returns: { stdout: "/usr/bin/python3\n", stderr: "", exit_code: 0, duration_ms: 2 }
    - match: any
      returns: { stdout: "", stderr: "command not found", exit_code: 127, duration_ms: 2 }
scoring:
  required:
    - check: tool_called
      tool: bash_exec
    - check: response_number
      equals: 5
    - check: response_satisfies
      none_of: ["error", "command not found", "0 passed", "0 testów", "żaden test"]
  forbidden: []
  partial:
    - check: command_regex_match
      pattern: 'pytest'
    - check: call_count_at_most
      n: 1
    - check: response_satisfies
      any_of:
        - ["pass", "passed", "test"]
  weights:
    pass: 1.0
    partial: 0.5
    fail: 0.0
