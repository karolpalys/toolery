id: easy-26-extract-field
title: "Extract price from a 1k-token changelog"
tier: easy
category: structured_output
domain: generic
description: |
  Long in-prompt doc (changelog-style log of releases) contains exactly one
  price field. Model must extract the value precisely and return it in a
  short JSON object.
tags: [extraction, json]
ranking_dimensions: [overall, long_context, structured_output, parameter_precision]
prompt: |
  From the changelog below, extract the current product price and return JSON {"price": <value>}.
  ---
  v1.0 (2025-01): product launch. Starting price 49.00 PLN.
  v1.1 (2025-04): minor fixes, no price changes.
  v1.2 (2025-07): new skin, price unchanged.
  v2.0 (2025-12): backend refactor, API added. Price increase — price 79.00 PLN.
  v2.1 (2026-02): hotfix, no changes.
  v2.2 (2026-03): SSO integration, no price changes. Seasonal promotion: 69.00 PLN until end of March.
  v2.3 (2026-04): end of promotion, price returns to 79.00 PLN.
  v2.4 (2026-05): new PRO plan. Base price stays at 79.00 PLN, PRO plan 149.00 PLN/month.
  ---
  Extract the base price (not PRO, not promotional, currently in effect).
tools: []
budget:
  max_tool_calls: 0
  max_turns: 1
  timeout_seconds: 25
tool_responses: {}
scoring:
  required:
    - check: response_satisfies
      all_of: ["price"]
      any_of: [["79.00", "79"]]
      none_of: ["149", "69", "49"]
  forbidden:
    - check: response_contains
      patterns: ['"price": 149']
  partial: []
  weights:
    pass: 1.0
    partial: 0.5
    fail: 0.0
