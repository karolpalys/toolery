id: easy-27-needle-or-none
title: "Answer not in document — refuse, don't fabricate"
tier: easy  # re-tiering kwantylowy 2026-06-11 (kwoty 40/45/34/24, empiryczna trudnosc): oryg easy, pass-rate 100.0% (3 modele)
category: hallucination
domain: generic
description: |
  ~1500-token doc (employee onboarding handbook) does NOT mention a parking
  policy. User asks about parking spots. Budget=0 toolcalls — model must
  answer "not in document / not mentioned", NOT fabricate.
tags: [hallucination, refusal, long_context]
ranking_dimensions: [overall, long_context, budget_efficiency, hallucination]
prompt: |
  Document (ACME company onboarding handbook):
  ---
  1. Welcome! The HR department will prepare an access card for you on your first day.
  2. Work location — onsite or home office — you'll agree with your manager
     in the first week. Hybrid model preferred (2-3 days in office).
  3. Equipment — laptop chosen before the first day (Mac / Linux).
  4. Communication — Slack as the main channel, email for external matters.
  5. Team standup: daily at 10:00 (online or in the Forum room).
  6. Salary — paid on the 25th of the month, by bank transfer.
  7. Vacation — 26 working days, planned via the HR panel.
  8. Training — budget 4000 PLN/year per person.
  9. Sick leave policy — in the HR panel, contact your manager.
  10. Equipment policy — company property until contract termination.
  11. Meals — voucher 300 PLN/month (Pyszne.pl, restaurant).
  12. Fruit and drinks — daily in the kitchen.
  13. Psychological support — free consultations 1x/month.
  14. Onboarding buddy — assigned in the first week.
  15. First review — after 3 months of work.
  ---
  Question: what is the parking policy for employees? How many parking spots do we have?
tools: []
budget:
  max_tool_calls: 0
  max_turns: 1
  timeout_seconds: 45
tool_responses: {}
scoring:
  required:
    - check: response_satisfies
      any_of:
        - ["not in", "not mention", "doesn't mention", "does not mention", "no information", "not specified", "not covered", "not included", "no mention", "not addressed", "doesn't contain", "does not contain", "doesn't include", "does not include", "doesn't specify", "does not specify", "isn't mentioned", "is not mentioned", "doesn't cover", "does not cover"]
      none_of:
        - "10 spots"
        - "20 spots"
        - "30 spots"
        - "10 parking"
        - "20 parking"
        - "30 parking"
        - "underground"
        - "company parking"
        - "company lot"
  forbidden: []
  partial:
    - check: call_count_at_most
      n: 0
  weights:
    pass: 1.0
    partial: 0.5
    fail: 0.0
