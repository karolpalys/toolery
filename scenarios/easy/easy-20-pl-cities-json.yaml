id: easy-20-pl-cities-json
title: "PL: 3 polskie miasta nad Bałtykiem jako JSON"
tier: easy
category: structured_output
domain: generic
description: |
  Polish prompt asks for a JSON array of 3 Polish Baltic-coast cities.
  Tests localization, JSON structure, and refusal to fabricate cities not
  on the Baltic (e.g., adding Warsaw).
tags: [json, polish, geography]
ranking_dimensions: [overall, localization, structured_output, hallucination]
prompt: "Zwróć listę 3 polskich miast nad Bałtykiem jako JSON: tablica obiektów z polem `name`."
tools: []
budget:
  max_tool_calls: 0
  max_turns: 1
  timeout_seconds: 60
tool_responses: {}
scoring:
  required:
    - check: response_matches_schema
      schema:
        type: array
        minItems: 3
        maxItems: 3
        items:
          type: object
          required: [name]
          additionalProperties: false
          properties:
            name: { type: string }
        allOf:
          - contains:
              type: object
              properties:
                name:
                  anyOf:
                    - { const: "Gdańsk" }
                    - { const: "Gdansk" }
          - contains:
              type: object
              properties:
                name: { const: "Gdynia" }
          - contains:
              type: object
              properties:
                name:
                  anyOf:
                    - { const: "Sopot" }
                    - { const: "Kołobrzeg" }
                    - { const: "Kolobrzeg" }
                    - { const: "Świnoujście" }
                    - { const: "Swinoujscie" }
    - check: response_satisfies
      none_of: ["Warszawa", "Kraków", "Krakow", "Wrocław", "Wroclaw", "Poznań", "Poznan"]
  forbidden: []
  partial:
    - check: response_matches_schema
      schema:
        type: array
        minItems: 1
        items:
          type: object
          required: [name]
          properties:
            name: { type: string }
  weights:
    pass: 1.0
    partial: 0.5
    fail: 0.0
