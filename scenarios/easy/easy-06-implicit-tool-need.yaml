id: easy-06-implicit-tool-need
title: "Infer two-step chain from intent (tool-agnostic v0.2)"
tier: easy
category: tool_selection
domain: generic
description: |
  User asks to email Bob. Model must figure out contact lookup → email send.
  v0.2 scoring is tool-agnostic — semantic outcome required (correct recipient
  + message gist), proper mock tool path is bonus.
tags: [chain, implicit_planning, tool_agnostic]
ranking_dimensions: [overall, agentic]
prompt: "Send Bob an email saying 'Heads up — meeting moved to 4pm.' Bob's last name is Reilly, he works in our company."
tools: [get_contacts, send_email, calculator]
budget:
  max_tool_calls: 2
  max_turns: 3
  timeout_seconds: 45
tool_responses:
  get_contacts:
    - match: { name: "Bob" }
      returns:
        - { name: "Bob Reilly", email: "bob@company.com" }
    - match: any
      returns: []
  send_email:
    - match: any
      returns: { ok: true, message_id: "m-1" }
scoring:
  required:
    - check: response_satisfies
      all_of: ["bob"]
      any_of:
        - ["meeting", "moved", "4pm", "4 pm", "16:00", "reschedul"]
        - ["sent", "send", "email", "message"]
      none_of: ["an error", "error:", "couldn't send", "could not send"]
  forbidden:
    - check: tool_called
      tool: calculator
  partial:
    - check: tool_called
      tool: send_email
    - check: tool_called_in_order
      sequence: [get_contacts, send_email]
    - check: call_count_at_most
      n: 2
  weights:
    pass: 1.0
    partial: 0.5
    fail: 0.0
