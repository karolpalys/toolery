id: easy-38-if-exact-sentence-count
title: "Reply as exactly 3 numbered points"
tier: easy  # re-tiering kwantylowy 2026-06-11 (kwoty 40/45/34/24, empiryczna trudnosc): oryg easy, pass-rate 100.0% (3 modele)
category: instruction_following
domain: generic
description: |
  Hard structural constraint — exactly 3 numbered points, no preamble,
  no postamble, no 4th point. Tests literal numeric+format adherence.
tags: [instruction_following, format_constraint, single_turn]
ranking_dimensions: [overall, instruction_following]
prompt: |
  Explain what a binary search tree is. Format your reply as EXACTLY 3
  numbered points like:
    1. ...
    2. ...
    3. ...
  No preamble, no closing remarks, no fourth point. Just the 3 numbered lines.
tools: []
budget:
  max_tool_calls: 0
  max_turns: 1
  timeout_seconds: 30
tool_responses: {}
scoring:
  required:
    - check: response_matches_regex
      all_of:
        - "^\\s*1\\.\\s"
        - "\\n\\s*2\\.\\s"
        - "\\n\\s*3\\.\\s"
      none_of:
        - "\\n\\s*4\\.\\s"
    - check: response_satisfies
      any_of:
        - ["binary search tree", "BST", "sorted", "ordered", "node"]
  forbidden: []
  partial:
    - check: response_matches_regex
      all_of:
        - "1\\.\\s"
        - "2\\.\\s"
        - "3\\.\\s"
    - check: response_satisfies
      any_of:
        - ["binary search tree"]
        - ["left", "right", "node"]
  weights:
    pass: 1.0
    partial: 0.5
    fail: 0.0
